apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-web-rollouts
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/G-03-XBrain-Phase-2/hoangson-aws-accelerator-p2.git
    targetRevision: main
    path: cloud/w9/project-01-gitops-observability-canary/rollouts
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
