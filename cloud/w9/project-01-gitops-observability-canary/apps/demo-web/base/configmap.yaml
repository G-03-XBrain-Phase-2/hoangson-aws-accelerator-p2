apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-web-content
  namespace: demo-web
  labels:
    app.kubernetes.io/name: demo-web
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>W9 Demo Web</title>
      <style>
        body {
          margin: 0;
          min-height: 100vh;
          display: grid;
          place-items: center;
          font-family: Inter, ui-sans-serif, system-ui, sans-serif;
          background: #f6f8fb;
          color: #172033;
        }
        main {
          width: min(760px, calc(100% - 48px));
          border: 1px solid #dbe3ef;
          border-radius: 8px;
          background: #fff;
          padding: 40px;
          box-shadow: 0 18px 48px rgba(31, 44, 71, 0.10);
        }
        p {
          color: #526173;
          line-height: 1.6;
        }
      </style>
    </head>
    <body>
      <main>
        <h1>W9 GitOps Demo Web</h1>
        <p>This app is prepared for GitOps, observability, and canary delivery.</p>
      </main>
    </body>
    </html>
  healthz: |
    ok
