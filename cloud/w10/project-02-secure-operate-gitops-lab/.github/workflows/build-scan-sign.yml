name: Build, Scan, Sign

on:
  push:
    branches:
      - main
    paths:
      - "cloud/w10/project-02-secure-operate-gitops-lab/src/api/**"
      - "cloud/w10/project-02-secure-operate-gitops-lab/.github/workflows/build-scan-sign.yml"
      - ".github/workflows/w10-build-scan-sign.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-scan-sign:
    runs-on: ubuntu-latest
    env:
      PROJECT_DIR: cloud/w10/project-02-secure-operate-gitops-lab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          short_sha="${GITHUB_SHA::7}"
          echo "repo=ghcr.io/${owner}/w10-api" >> "$GITHUB_OUTPUT"
          echo "tag=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version=v${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ${{ steps.image.outputs.repo }}:${{ steps.image.outputs.tag }} \
            ./${PROJECT_DIR}/src/api

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.repo }}:${{ steps.image.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Push image
        run: docker push ${{ steps.image.outputs.repo }}:${{ steps.image.outputs.tag }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Sign image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes \
            --key env://COSIGN_PRIVATE_KEY \
            ${{ steps.image.outputs.repo }}:${{ steps.image.outputs.tag }}

      - name: Update rollout image
        shell: bash
        run: |
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ steps.image.outputs.repo }}:${{ steps.image.outputs.tag }}|g" ${PROJECT_DIR}/app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"${{ steps.image.outputs.version }}\"|g" ${PROJECT_DIR}/app-api/rollout.yaml

      - name: Commit rollout update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${PROJECT_DIR}/app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No rollout change"
          else
            git commit -m "chore: update signed image to ${{ steps.image.outputs.version }}"
            git push
          fi
